<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Σύνδεση | Luminex</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="h-screen overflow-hidden bg-[#06111f] text-slate-100">
    <div class="relative flex h-screen items-center justify-center overflow-hidden px-6">
        <div class="absolute inset-0 bg-[radial-gradient(circle_at_top,_rgba(56,189,248,0.18),transparent_28%),radial-gradient(circle_at_bottom_right,_rgba(14,165,233,0.14),transparent_24%),linear-gradient(160deg,#020617,#071427_55%,#0b1324)]"></div>
        <div class="absolute left-[-120px] top-[-120px] h-72 w-72 rounded-full bg-sky-400/10 blur-3xl"></div>
        <div class="absolute bottom-[-100px] right-[-80px] h-80 w-80 rounded-full bg-cyan-300/10 blur-3xl"></div>
        <div class="absolute inset-0 opacity-[0.08]" style="background-image: linear-gradient(rgba(148,163,184,0.3) 1px, transparent 1px), linear-gradient(90deg, rgba(148,163,184,0.3) 1px, transparent 1px); background-size: 36px 36px;"></div>

        <div class="relative w-full max-w-md overflow-hidden rounded-[2rem] border border-white/10 bg-white/8 p-8 shadow-[0_20px_80px_rgba(2,6,23,0.6)] backdrop-blur-2xl">
            <div class="absolute inset-x-8 top-0 h-px bg-gradient-to-r from-transparent via-sky-300/80 to-transparent"></div>

            <div class="text-center">
                <div class="mx-auto flex h-16 w-16 items-center justify-center rounded-2xl border border-sky-300/20 bg-sky-400/10 text-2xl shadow-[0_0_30px_rgba(56,189,248,0.2)]">
                    ✦
                </div>
                <h1 class="mt-5 text-3xl font-bold tracking-[0.35em] text-white">LUMINEX</h1>
                <p class="mt-3 text-sm tracking-[0.18em] uppercase text-sky-200/80">Internal Access</p>
                <p class="mt-3 text-sm text-slate-300">Σύνδεση στο σύστημα.</p>
            </div>

            <form method="post" class="mt-8 space-y-5">
                {% csrf_token %}

                {% if form.non_field_errors %}
                    <div class="rounded-2xl border border-red-400/30 bg-red-400/10 px-4 py-3 text-sm text-red-200">
                        {% for error in form.non_field_errors %}
                            <div>{{ error }}</div>
                        {% endfor %}
                    </div>
                {% endif %}

                <div>
                    <label for="{{ form.username.id_for_label }}" class="mb-2 block text-xs font-semibold uppercase tracking-[0.24em] text-slate-400">
                        Username
                    </label>
                    <input
                        type="text"
                        name="{{ form.username.html_name }}"
                        id="{{ form.username.id_for_label }}"
                        value="{{ form.username.value|default_if_none:'' }}"
                        class="w-full rounded-2xl border border-white/10 bg-slate-950/40 px-4 py-3 text-sm text-white outline-none transition placeholder:text-slate-500 focus:border-sky-300/60 focus:bg-slate-950/60 focus:ring-4 focus:ring-sky-400/10"
                        placeholder="Username"
                        required
                    >
                </div>

                <div>
                    <label for="{{ form.password.id_for_label }}" class="mb-2 block text-xs font-semibold uppercase tracking-[0.24em] text-slate-400">
                        Password
                    </label>
                    <input
                        type="password"
                        name="{{ form.password.html_name }}"
                        id="{{ form.password.id_for_label }}"
                        class="w-full rounded-2xl border border-white/10 bg-slate-950/40 px-4 py-3 text-sm text-white outline-none transition placeholder:text-slate-500 focus:border-sky-300/60 focus:bg-slate-950/60 focus:ring-4 focus:ring-sky-400/10"
                        placeholder="Password"
                        required
                    >
                </div>

                <button
                    type="submit"
                    class="w-full rounded-2xl border border-sky-300/30 bg-gradient-to-r from-sky-400 to-cyan-300 px-4 py-3 text-sm font-semibold text-slate-950 shadow-[0_0_30px_rgba(56,189,248,0.18)] transition hover:brightness-110"
                >
                    Σύνδεση
                </button>
            </form>

            <div class="mt-6 rounded-2xl border border-white/8 bg-slate-950/30 px-4 py-3 text-[11px] uppercase tracking-[0.2em] text-slate-400">
                Luminex secure workspace
            </div>
        </div>
    </div>
</body>
</html>
